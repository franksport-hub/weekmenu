<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekmenu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; padding: 15px; margin: 0; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; margin-top: 0; }
        
        /* Gebruiker Selectie */
        .user-selector { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        select, input[type="text"] { padding: 10px; font-size: 1em; border-radius: 6px; border: 1px solid #ccc; width: 100%; max-width: 300px; margin-bottom: 10px; }
        
        .link-btn { background: none; border: none; color: #007bff; text-decoration: underline; cursor: pointer; font-size: 0.85em; margin-top: 5px; }

        /* Weekplanner */
        .planner-section { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #eef2f5; }
        .planner-section h2 { margin-top: 0; font-size: 1.2em; color: #333; text-align: center; margin-bottom: 15px; }
        .planner-day { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .planner-day:last-child { border-bottom: none; }
        .planner-date { font-weight: bold; font-size: 0.95em; width: 110px; color: #444; }
        .planner-select { flex-grow: 1; max-width: 65%; margin-bottom: 0; background-color: #fcfcfc; }

        /* Nieuwe toevoeg-secties */
        .add-meal-section { text-align: center; margin-bottom: 20px; padding-top: 20px; border-top: 2px dashed #eee; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 1em; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0056b3; }
        .add-form { display: none; background: #eef2f5; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .add-form.active { display: block; }

        /* Maaltijd Lijst */
        .meal-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .meal-item:last-child { border-bottom: none; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; }
        .meal-name { font-weight: bold; font-size: 1.1em; }
        
        /* Sterren */
        .stars-outer { display: inline-block; position: relative; color: #e0e0e0; font-size: 1.2em; letter-spacing: 2px; }
        .stars-outer::before { content: "★★★★★"; }
        .stars-inner { position: absolute; top: 0; left: 0; white-space: nowrap; overflow: hidden; color: #ffc107; }
        .stars-inner::before { content: "★★★★★"; }
        .rating-text { font-size: 0.9em; color: #666; margin-left: 5px; }

        .my-rating-box { background: #f9f9f9; padding: 10px; border-radius: 6px; font-size: 0.9em; display: none; align-items: center; justify-content: space-between;}
        .my-rating-box.active { display: flex; }
        .rate-btn { background: none; border: 1px solid #ccc; font-size: 1.2em; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; color: #ccc; transition: 0.2s; }
        .rate-btn.selected { color: #ffc107; border-color: #ffc107; background: #fffde7; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🍽️ Weekmenu</h1>
    
    <div class="user-selector">
        <strong>Wie ben jij?</strong><br>
        <select id="user-select" onchange="veranderGebruiker()">
            <option value="">-- Kies je naam --</option>
        </select>
        <br>
        <button class="link-btn" onclick="togglePersoonToevoegen()">+ Nieuw gezinslid toevoegen</button>
        
        <div id="add-person-form" class="add-form">
            <input type="text" id="new-person-name" placeholder="Naam van gezinslid">
            <button class="btn" style="background: #28a745; padding: 8px 15px;" onclick="voegPersoonToe()">Toevoegen</button>
        </div>
    </div>

    <div class="planner-section">
        <h2>📅 Deze Week</h2>
        <div id="planner-list">Planner laden...</div>
    </div>

    <div class="add-meal-section">
        <button class="btn" onclick="toggleGerechtToevoegen()">+ Nieuw Gerecht</button>
        <div id="add-meal-form" class="add-form">
            <input type="text" id="new-meal-name" placeholder="Naam van het gerecht (bijv. Taco's)">
