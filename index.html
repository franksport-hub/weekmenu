<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekmenu App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; padding: 20px; margin: 0; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .meal-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .meal-item:last-child { border-bottom: none; }
        .meal-name { font-weight: bold; font-size: 1.1em; }
        .meal-date { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🍽️ Onze Maaltijden</h1>
    <div id="meal-list">Laden van maaltijden...</div>
</div>

<script>
    // --- JOUW SUPABASE GEGEVENS HIER ---
    // 1. Ga in Supabase naar 'Project Settings' (het tandwiel) -> 'API'
    // 2. Kopieer de 'Project URL' en plak hem hieronder:
    const SUPABASE_URL= 'https://ythfhzepuwggfcpoyvem.supabase.co';
    // 3. Kopieer de 'anon public' sleutel en plak hem hieronder:
    const SUPABASE_KEY= 'sb_publishable_bmRk9F8MjM3-gGe_6fVDMA_0fVUfkkg'; 

    // Initialiseer Supabase
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Functie om de data op te halen en op het scherm te zetten
    async function haalMaaltijdenOp() {
        const { data, error } = await supabase
            .from('maaltijden')
            .select('*');

        if (error) {
            console.error("Fout bij ophalen:", error);
            document.getElementById('meal-list').innerHTML = "Er ging iets mis bij het ophalen van de data.";
            return;
        }

        const listContainer = document.getElementById('meal-list');
        listContainer.innerHTML = ''; // Maak de "Laden..." tekst leeg

        data.forEach(maaltijd => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'meal-item';
            
            // Format de datum
            const datumStr = maaltijd.laatst_gegeten ? new Date(maaltijd.laatst_gegeten).toLocaleDateString('nl-NL') : 'Nog niet gegeten';

            itemDiv.innerHTML = `
                <div>
                    <div class="meal-name">${maaltijd.naam}</div>
                    <div class="meal-date">Laatst gegeten: ${datumStr}</div>
                </div>
                <div>⭐ (Ratings komen later)</div>
            `;
            listContainer.appendChild(itemDiv);
        });
    }

    // Start de functie zodra de pagina is geladen
    haalMaaltijdenOp();
</script>

</body>
</html>
